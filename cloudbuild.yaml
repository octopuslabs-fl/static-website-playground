steps:
  # Step 1: Install dependencies
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['ci']

  # Step 2: Build with Vite
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Step 3: Deploy to GCS bucket
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - '-c'
      - '-d'
      - 'dist'
      - 'gs://static-website-playground-valaris'

options:
  logging: CLOUD_LOGGING_ONLY
